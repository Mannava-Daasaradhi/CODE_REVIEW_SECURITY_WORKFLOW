# ============================================================
# CONFIG.YAML — Single source of truth for all settings
# No magic numbers anywhere in src/ — everything lives here
# ============================================================

project:
  name: "CODE_REVIEW_SECURIY_WORKFLOW"
  version: "0.1.0"
  description: ""
  domain: "ai"  # quantum | cyber | ai | data | hybrid

# === PATHS ===
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  checkpoints: "checkpoints"
  logs: "logs"
  notebooks: "notebooks"

# === LOGGING ===
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  file: "logs/run.log"
  rotation: "10 MB"

# === REPRODUCIBILITY ===
reproducibility:
  seed: 42          # used for all random seeds
  deterministic: true

