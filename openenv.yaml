name: pr-review-security-audit
version: "1.0.0"
description: >
  OpenEnv environment for training and evaluating AI agents on code review
  and security auditing tasks. Three difficulty tiers with deterministic graders.
author: your-team-name
license: MIT

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: task1
    difficulty: easy
    description: Detect obvious bugs in small functions (null pointers, off-by-one errors, wrong conditions)
  - id: task2
    difficulty: medium
    description: Identify OWASP Top 10 vulnerabilities (SQL injection, hardcoded secrets, XSS) in web routes
  - id: task3
    difficulty: hard
    description: Review a multi-file PR diff — find bugs, flag security issues, rate code quality

reward:
  type: float
  range: [0.0, 1.0]
  deterministic: true
